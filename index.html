<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17181B">
<title>Diário de Pendências — Obra</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   TOKENS — paleta tirada da obra: concreto, fôrma, zarcão,
   amarelo de sinalização, azul cobalto, verde bandeira.
   ───────────────────────────────────────────────────────────── */
:root{
  --concreto:#D9D6CE;
  --concreto-2:#C9C5BB;
  --forma:#F3F1EB;
  --forma-2:#EAE7DF;
  --grafite:#17181B;
  --grafite-60:#5C5F66;
  --grafite-35:#9A9CA1;
  --amarelo:#FFC400;
  --amarelo-esc:#D9A600;
  --zarcao:#C2410C;
  --cobalto:#1E40AF;
  --verde:#14713D;

  --r:3px;
  --tap:52px;
  --rail:78px;

  --sans:'Barlow',system-ui,sans-serif;
  --cond:'Barlow Condensed',var(--sans);
  --mono:'JetBrains Mono',ui-monospace,monospace;

  --sombra:0 1px 0 rgba(23,24,27,.16), 0 2px 6px rgba(23,24,27,.09);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;background:var(--concreto);color:var(--grafite);
  font-family:var(--sans);font-size:16px;line-height:1.42;
  overscroll-behavior-y:none;-webkit-text-size-adjust:100%;
}
button,input,select,textarea{font-family:inherit;font-size:16px;color:inherit}
button{cursor:pointer;border:0;background:none}
:focus-visible{outline:3px solid var(--cobalto);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* faixa zebrada — usada UMA vez, no lacre. */
.zebra{
  background-image:repeating-linear-gradient(-45deg,
    var(--amarelo) 0 12px, var(--grafite) 12px 24px);
}

/* ── APP SHELL ─────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100dvh}

.placa{
  display:flex;align-items:stretch;gap:0;
  background:var(--grafite);color:var(--forma);
  border-bottom:4px solid var(--amarelo);
  padding-top:env(safe-area-inset-top);
  flex:0 0 auto;
}
.placa-id{
  font-family:var(--cond);font-weight:700;font-size:13px;letter-spacing:.16em;
  text-transform:uppercase;background:var(--amarelo);color:var(--grafite);
  display:flex;align-items:center;padding:0 12px;white-space:nowrap;
}
.placa-txt{padding:9px 14px;min-width:0;flex:1}
.placa-txt h1{
  font-family:var(--cond);font-weight:700;font-size:19px;letter-spacing:.06em;
  text-transform:uppercase;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.placa-txt p{margin:0;font-size:11.5px;color:var(--grafite-35);
  font-family:var(--mono);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.placa-acao{
  display:flex;align-items:center;padding:0 14px;font-family:var(--cond);
  font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--amarelo);border-left:1px solid #33353A;
}

main{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.wrap{padding:16px 16px 26px;max-width:1180px;margin:0 auto}

/* ── NAVEGAÇÃO: barra embaixo no retrato, trilho lateral no paisagem ── */
nav{
  display:flex;background:var(--grafite);flex:0 0 auto;
  padding-bottom:env(safe-area-inset-bottom);
  border-top:1px solid #2C2E33;
}
nav button{
  flex:1;min-height:var(--tap);padding:8px 2px 9px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--grafite-35);font-family:var(--cond);font-weight:600;
  font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;
  border-top:3px solid transparent;
}
nav button svg{width:21px;height:21px;stroke:currentColor;stroke-width:1.8;fill:none}
nav button[aria-current="page"]{color:var(--amarelo);border-top-color:var(--amarelo)}
nav .badge{
  position:absolute;transform:translate(16px,-4px);
  background:var(--zarcao);color:#fff;font-family:var(--mono);font-weight:700;
  font-size:9.5px;line-height:1;padding:2.5px 4px;border-radius:2px;
}

@media (min-width:860px) and (orientation:landscape){
  #app{flex-direction:row}
  nav{
    flex-direction:column;width:var(--rail);border-top:0;border-right:1px solid #2C2E33;
    padding:10px 0 env(safe-area-inset-bottom);
  }
  nav button{flex:0 0 auto;min-height:64px;border-top:0;border-left:3px solid transparent}
  nav button[aria-current="page"]{border-left-color:var(--amarelo)}
  .col{display:flex;flex-direction:column;flex:1;min-width:0}
}

/* ── TIPOGRAFIA UTILITÁRIA ─────────────────────────────────── */
.olho{
  font-family:var(--cond);font-weight:600;font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--grafite-60);margin:0 0 8px;
  display:flex;align-items:center;gap:9px;
}
.olho::after{content:"";flex:1;height:1px;background:var(--concreto-2)}
.num{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums}

/* ── PAINEL ────────────────────────────────────────────────── */
/* O contador é o argumento da ferramenta: ambiente, não pendência. */
.contador{
  background:var(--grafite);color:var(--forma);padding:20px 20px 18px;
  border-radius:var(--r);box-shadow:var(--sombra);margin-bottom:14px;position:relative;overflow:hidden;
}
.contador::before{content:"";position:absolute;inset:0 0 auto;height:4px;background:var(--amarelo)}
.contador-n{
  font-family:var(--mono);font-weight:700;font-size:clamp(56px,15vw,84px);
  line-height:.86;letter-spacing:-.04em;color:var(--amarelo);font-variant-numeric:tabular-nums;
}
.contador-l{
  font-family:var(--cond);font-weight:600;font-size:15px;letter-spacing:.14em;
  text-transform:uppercase;margin-top:8px;color:var(--forma);
}
.contador-sub{font-family:var(--mono);font-size:11.5px;color:var(--grafite-35);margin-top:4px}
.barra{display:flex;height:7px;margin-top:16px;background:#2C2E33;border-radius:2px;overflow:hidden}
.barra i{display:block;height:100%}

.cifras{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.cifra{
  background:var(--forma);border:1px solid var(--concreto-2);border-radius:var(--r);
  padding:12px 12px 11px;text-align:left;border-left-width:4px;
}
.cifra b{display:block;font-family:var(--mono);font-weight:700;font-size:28px;line-height:1;font-variant-numeric:tabular-nums}
.cifra span{
  display:block;font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--grafite-60);margin-top:6px;
}
.cifra.pend{border-left-color:var(--zarcao)} .cifra.pend b{color:var(--zarcao)}
.cifra.exec{border-left-color:var(--cobalto)} .cifra.exec b{color:var(--cobalto)}
.cifra.veri{border-left-color:var(--verde)} .cifra.veri b{color:var(--verde)}

/* ── SIGNATURE: A PORTA ────────────────────────────────────────
   Cada ambiente é uma porta. O estado mora na porta, não na lista.
   ──────────────────────────────────────────────────────────── */
.portas{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.porta{
  position:relative;text-align:left;background:var(--forma);
  border:1px solid var(--concreto-2);border-radius:var(--r) var(--r) 0 0;
  box-shadow:var(--sombra);padding:13px 13px 12px;min-height:132px;
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .11s ease;
}
.porta:active{transform:translateY(1px)}
/* batente: a faixa colorida vertical = estado do ambiente */
.porta::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--grafite-35)}
.porta.aberto::before{background:var(--concreto-2)}
.porta.fechamento::before{background:var(--zarcao)}
.porta.lacrado::before{background:var(--verde)}
/* maçaneta */
.porta::after{
  content:"";position:absolute;right:11px;top:50%;width:9px;height:9px;
  border-radius:50%;background:var(--concreto-2);box-shadow:0 0 0 2px var(--forma-2);
}
.porta-cod{
  font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.08em;
  color:var(--grafite-35);margin-left:8px;
}
.porta-nome{
  font-family:var(--cond);font-weight:700;font-size:19px;line-height:1.06;
  text-transform:uppercase;letter-spacing:.02em;margin:3px 0 0 8px;padding-right:20px;
}
.porta-frentes{
  font-family:var(--sans);font-size:11.5px;color:var(--grafite-60);
  margin:6px 0 0 8px;padding-right:16px;line-height:1.3;
}
.porta-rodape{margin:auto 0 0 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tally{
  font-family:var(--mono);font-weight:700;font-size:12px;
  padding:3px 6px;border-radius:2px;line-height:1;
}
.tally.p{background:var(--zarcao);color:#fff}
.tally.e{background:var(--cobalto);color:#fff}
.tally.v{background:var(--verde);color:#fff}
.porta-vazia{
  font-family:var(--cond);font-weight:600;font-size:12px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--grafite-35);
}
/* o lacre: única aparição da zebra em todo o app */
.porta.lacrado{background:var(--forma-2)}
.lacre{
  position:absolute;left:-30%;right:-30%;top:50%;height:22px;
  transform:rotate(-11deg);display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(23,24,27,.3);
}
.lacre span{
  font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--grafite);background:var(--amarelo);
  padding:1px 8px;
}

/* ── LISTA DE ITENS ────────────────────────────────────────── */
.item{
  display:flex;gap:11px;width:100%;text-align:left;background:var(--forma);
  border:1px solid var(--concreto-2);border-left-width:5px;border-radius:var(--r);
  padding:11px 12px;margin-bottom:7px;align-items:flex-start;
}
.item.pendente{border-left-color:var(--zarcao)}
.item.executado{border-left-color:var(--cobalto);background:#EDF0FA}
.item.verificado{border-left-color:var(--verde);opacity:.62}
.item-mini{
  flex:0 0 46px;height:46px;border-radius:2px;background:var(--concreto-2);
  object-fit:cover;display:block;
}
.item-mini.vazio{
  display:flex;align-items:center;justify-content:center;
  font-family:var(--cond);font-size:10px;letter-spacing:.08em;color:var(--grafite-35);
}
.item-corpo{flex:1;min-width:0}
.item-topo{display:flex;align-items:center;gap:7px;margin-bottom:2px;flex-wrap:wrap}
.oficio{
  font-family:var(--cond);font-weight:700;font-size:10.5px;letter-spacing:.13em;
  text-transform:uppercase;background:var(--grafite);color:var(--amarelo);
  padding:2px 6px;border-radius:2px;line-height:1.35;
}
.idade{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--grafite-35)}
.idade.velha{color:var(--zarcao)}
.item-desc{font-size:14.5px;line-height:1.32;word-break:break-word}
.item.verificado .item-desc{text-decoration:line-through;text-decoration-thickness:1px}
.item-plano{
  font-size:12.5px;color:var(--grafite-60);margin-top:4px;padding-left:8px;
  border-left:2px solid var(--concreto-2);
}
.item-selo{
  flex:0 0 auto;font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 5px;border-radius:2px;align-self:center;
}
.item-selo.executado{background:var(--cobalto);color:#fff}
.item-selo.verificado{background:var(--verde);color:#fff}

/* ── BOTÕES ────────────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:var(--tap);padding:0 18px;border-radius:var(--r);
  font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:.11em;
  text-transform:uppercase;border:1px solid var(--grafite);
  background:var(--forma);color:var(--grafite);box-shadow:var(--sombra);
}
.btn:active{transform:translateY(1px);box-shadow:none}
.btn.forte{background:var(--amarelo);border-color:var(--amarelo-esc)}
.btn.escuro{background:var(--grafite);color:var(--forma);border-color:var(--grafite)}
.btn.ok{background:var(--verde);color:#fff;border-color:var(--verde)}
.btn.azul{background:var(--cobalto);color:#fff;border-color:var(--cobalto)}
.btn.fantasma{background:transparent;border-color:var(--concreto-2);box-shadow:none;color:var(--grafite-60)}
.btn.larga{width:100%}
.btn svg{width:19px;height:19px;stroke:currentColor;stroke-width:2;fill:none}
.btn[disabled]{opacity:.4;pointer-events:none}
.btn-linha{display:flex;gap:8px;flex-wrap:wrap}
.btn-linha > .btn{flex:1;min-width:130px}

/* botão flutuante de captura — o gesto mais frequente do app */
.captura{
  position:fixed;right:16px;z-index:40;
  bottom:calc(var(--tap) + 18px + env(safe-area-inset-bottom));
  height:62px;padding:0 22px;border-radius:31px;
  background:var(--amarelo);color:var(--grafite);border:2px solid var(--grafite);
  font-family:var(--cond);font-weight:700;font-size:16px;letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:9px;box-shadow:0 5px 16px rgba(23,24,27,.32);
}
.captura svg{width:23px;height:23px;stroke:var(--grafite);stroke-width:2;fill:none}
@media (min-width:860px) and (orientation:landscape){.captura{bottom:22px}}

/* ── FORMULÁRIO ────────────────────────────────────────────── */
.campo{margin-bottom:14px}
.campo > label{
  display:block;font-family:var(--cond);font-weight:600;font-size:12px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--grafite-60);margin-bottom:5px;
}
.campo input[type=text],.campo textarea,.campo select{
  width:100%;min-height:var(--tap);padding:11px 12px;background:var(--forma);
  border:1px solid var(--grafite-35);border-radius:var(--r);
}
.campo textarea{min-height:74px;resize:vertical;line-height:1.4}
.campo input:focus,.campo textarea:focus,.campo select:focus{border-color:var(--cobalto);outline:none;box-shadow:0 0 0 3px rgba(30,64,175,.16)}
.dica{font-size:12px;color:var(--grafite-60);margin:5px 0 0}

/* seletor de ofício em chips — mais rápido que dropdown com luva */
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:9px 12px;border:1px solid var(--concreto-2);background:var(--forma);
  border-radius:var(--r);font-family:var(--cond);font-weight:600;font-size:13px;
  letter-spacing:.07em;text-transform:uppercase;min-height:42px;
}
.chip[aria-pressed="true"]{background:var(--grafite);color:var(--amarelo);border-color:var(--grafite)}

.foto-slot{
  width:100%;aspect-ratio:4/3;max-height:270px;border:2px dashed var(--grafite-35);
  border-radius:var(--r);background:var(--forma-2);display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:7px;color:var(--grafite-60);
  font-family:var(--cond);font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  overflow:hidden;position:relative;
}
.foto-slot img{width:100%;height:100%;object-fit:cover}
.foto-slot svg{width:34px;height:34px;stroke:currentColor;stroke-width:1.5;fill:none}
.foto-x{
  position:absolute;top:8px;right:8px;width:38px;height:38px;border-radius:50%;
  background:var(--grafite);color:var(--forma);display:flex;align-items:center;justify-content:center;
  font-size:19px;line-height:1;
}

/* ── FOLHA (modal) ─────────────────────────────────────────── */
.folha{
  position:fixed;inset:0;z-index:60;background:rgba(23,24,27,.55);
  display:flex;align-items:flex-end;justify-content:center;
}
.folha-corpo{
  background:var(--concreto);width:100%;max-width:640px;max-height:92dvh;
  border-radius:8px 8px 0 0;display:flex;flex-direction:column;
  border-top:4px solid var(--amarelo);animation:sobe .17s ease-out;
}
@keyframes sobe{from{transform:translateY(22px);opacity:.4}to{transform:none;opacity:1}}
.folha-topo{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 16px;border-bottom:1px solid var(--concreto-2);flex:0 0 auto;
}
.folha-topo h2{
  font-family:var(--cond);font-weight:700;font-size:18px;letter-spacing:.1em;
  text-transform:uppercase;margin:0;
}
.folha-scroll{overflow-y:auto;padding:16px;flex:1}
.folha-pe{
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  border-top:1px solid var(--concreto-2);flex:0 0 auto;background:var(--forma-2);
}
.fechar{width:42px;height:42px;font-size:24px;line-height:1;color:var(--grafite-60)}

/* ── RONDA ─────────────────────────────────────────────────── */
.ronda-card{
  background:var(--forma);border:1px solid var(--concreto-2);border-top:5px solid var(--cobalto);
  border-radius:var(--r);box-shadow:var(--sombra);overflow:hidden;margin-bottom:12px;
}
.ronda-cab{padding:13px 15px 12px;border-bottom:1px solid var(--concreto-2)}
.ronda-local{
  font-family:var(--cond);font-weight:700;font-size:15px;letter-spacing:.09em;
  text-transform:uppercase;color:var(--grafite-60);
}
.ronda-desc{font-size:17px;line-height:1.3;margin-top:5px}
.ronda-fotos{display:grid;grid-template-columns:1fr;background:var(--grafite-35)}
.ronda-fotos.par{grid-template-columns:1fr 1fr;gap:1px}
.ronda-foto{position:relative;background:var(--forma-2);aspect-ratio:4/3}
.ronda-foto img{width:100%;height:100%;object-fit:cover;display:block}
.ronda-foto b{
  position:absolute;left:0;bottom:0;font-family:var(--cond);font-weight:700;font-size:11px;
  letter-spacing:.16em;text-transform:uppercase;background:var(--grafite);color:var(--amarelo);
  padding:3px 8px;
}
.ronda-acoes{display:flex;gap:8px;padding:12px}
.ronda-acoes .btn{flex:1}

/* ── DESPACHO ──────────────────────────────────────────────── */
.saida{
  width:100%;min-height:210px;font-family:var(--mono);font-size:12.5px;line-height:1.55;
  padding:13px;background:var(--forma);border:1px solid var(--grafite-35);
  border-radius:var(--r);white-space:pre;overflow:auto;
}

/* ── VAZIO / AVISO ─────────────────────────────────────────── */
.vazio{
  border:2px dashed var(--concreto-2);border-radius:var(--r);padding:34px 22px;
  text-align:center;color:var(--grafite-60);
}
.vazio h3{
  font-family:var(--cond);font-weight:700;font-size:19px;letter-spacing:.1em;
  text-transform:uppercase;margin:0 0 7px;color:var(--grafite);
}
.vazio p{margin:0 0 16px;font-size:14px}

.aviso{
  display:flex;gap:10px;align-items:flex-start;background:#FFF4D1;
  border:1px solid var(--amarelo-esc);border-left:5px solid var(--amarelo-esc);
  border-radius:var(--r);padding:11px 13px;margin-bottom:14px;font-size:13.5px;line-height:1.4;
}
.aviso strong{font-family:var(--cond);letter-spacing:.09em;text-transform:uppercase;font-size:12.5px}

.toast{
  position:fixed;left:50%;bottom:calc(var(--tap) + 84px);transform:translateX(-50%);
  background:var(--grafite);color:var(--forma);padding:11px 17px;border-radius:var(--r);
  font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:.09em;text-transform:uppercase;
  z-index:90;box-shadow:0 5px 18px rgba(23,24,27,.4);border-left:4px solid var(--amarelo);
  animation:sobe .15s ease-out;pointer-events:none;max-width:88vw;text-align:center;
}
.esconde{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="col">
    <header class="placa">
      <div class="placa-id" id="placaId">OBRA</div>
      <div class="placa-txt">
        <h1 id="placaTitulo">Diário de Pendências</h1>
        <p id="placaSub">carregando…</p>
      </div>
      <button class="placa-acao esconde" id="placaAcao"></button>
    </header>
    <main><div class="wrap" id="tela"></div></main>
  </div>

  <nav id="nav">
    <button data-t="painel" aria-current="page">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Painel</button>
    <button data-t="ambientes">
      <svg viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18"/><circle cx="15.5" cy="12" r="1"/></svg>Ambientes</button>
    <button data-t="varredura">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h9"/><circle cx="18" cy="17" r="3"/></svg>Varredura</button>
    <button data-t="ronda" style="position:relative">
      <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Ronda
      <em class="badge esconde" id="badgeRonda"></em></button>
    <button data-t="despacho">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 01-9 8.4 8.5 8.5 0 01-4-1L3 21l2.1-5a8.5 8.5 0 01-1-4 8.4 8.4 0 018.4-8.4h.5a8.4 8.4 0 018 8v.4z"/></svg>Despacho</button>
    <button data-t="cofre">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 20h16"/></svg>Cofre</button>
  </nav>
</div>

<button class="captura esconde" id="btnCaptura">
  <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Anotar
</button>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   DIÁRIO DE PENDÊNCIAS — obra
   Uma superfície. Sem servidor. Sem conta. Sem estado compartilhado.
   Os dados vivem no IndexedDB deste aparelho e não saem daqui.
   ═══════════════════════════════════════════════════════════════ */

const OFICIOS = ['Elétrica','Hidráulica','Alvenaria','Reboco','Gesso/Forro','Pintura',
  'Piso/Revest.','Esquadrias','Serralheria','Marcenaria','Impermeab.','Cobertura',
  'Climatização','Louças/Metais','Vidros','Limpeza','Outros'];

const ESTADO_AMB = {
  aberto:      {rot:'Frente aberta',  cor:'var(--grafite-35)'},
  fechamento:  {rot:'Em fechamento',  cor:'var(--zarcao)'},
  lacrado:     {rot:'Lacrado',        cor:'var(--verde)'}
};

/* ── IndexedDB ─────────────────────────────────────────────── */
const DB='diario-pendencias', VER=1;
let db;
function abrir(){
  return new Promise((ok,err)=>{
    const r=indexedDB.open(DB,VER);
    r.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('ambientes')) d.createObjectStore('ambientes',{keyPath:'id'});
      if(!d.objectStoreNames.contains('itens')){
        const s=d.createObjectStore('itens',{keyPath:'id'});
        s.createIndex('ambienteId','ambienteId'); s.createIndex('estado','estado');
      }
      if(!d.objectStoreNames.contains('fotos')) d.createObjectStore('fotos',{keyPath:'id'});
      if(!d.objectStoreNames.contains('meta')) d.createObjectStore('meta',{keyPath:'k'});
    };
    r.onsuccess=e=>{db=e.target.result;ok(db)};
    r.onerror=()=>err(r.error);
  });
}
const tx=(loja,modo='readonly')=>db.transaction(loja,modo).objectStore(loja);
const req=r=>new Promise((ok,err)=>{r.onsuccess=()=>ok(r.result);r.onerror=()=>err(r.error)});
const todos=l=>req(tx(l).getAll());
const pega=(l,k)=>req(tx(l).get(k));
const grava=(l,v)=>req(tx(l,'readwrite').put(v));
const apaga=(l,k)=>req(tx(l,'readwrite').delete(k));

/* ── Estado em memória ─────────────────────────────────────── */
let S={ambientes:[],itens:[],obra:{nome:'Reforma — Secretaria de Cultura',codigo:'OBRA'}};
let tela='painel', ambienteAberto=null, urls=new Map();

const id = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dias = d => Math.floor((Date.now()-d)/864e5);
const $ = s => document.querySelector(s);
const tel = $('#tela');

function toast(m){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2100);
}
async function urlFoto(fid){
  if(!fid) return null;
  if(urls.has(fid)) return urls.get(fid);
  const f=await pega('fotos',fid); if(!f) return null;
  const u=URL.createObjectURL(f.blob); urls.set(fid,u); return u;
}

/* ── Foto: comprime na captura. Foto crua de tablet estoura o
   armário em poucas dezenas de itens. ─────────────────────── */
function comprime(file,max=1280,q=.72){
  return new Promise((ok,err)=>{
    const img=new Image(), fr=new FileReader();
    fr.onload=()=>img.src=fr.result;
    fr.onerror=()=>err(new Error('leitura'));
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(Math.max(w,h)>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k)}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>b?ok(b):err(new Error('canvas')),'image/jpeg',q);
    };
    img.onerror=()=>err(new Error('imagem'));
    fr.readAsDataURL(file);
  });
}
function tirarFoto(){
  return new Promise(ok=>{
    const i=document.createElement('input');
    i.type='file';i.accept='image/*';i.capture='environment';
    i.onchange=async()=>{
      const f=i.files&&i.files[0]; if(!f) return ok(null);
      try{ ok(await comprime(f)) }catch{ toast('Não deu pra ler a foto'); ok(null) }
    };
    i.click();
  });
}

/* ── Consultas ─────────────────────────────────────────────── */
const doAmb    = a => S.itens.filter(i=>i.ambienteId===a);
const abertos  = a => doAmb(a).filter(i=>i.estado!=='verificado');
const contaAmb = a => {const l=doAmb(a);return{
  p:l.filter(i=>i.estado==='pendente').length,
  e:l.filter(i=>i.estado==='executado').length,
  v:l.filter(i=>i.estado==='verificado').length, t:l.length}};
const nomeAmb  = a => (S.ambientes.find(x=>x.id===a)||{}).nome || '—';
function ordAmb(a,b){
  const o={fechamento:0,aberto:1,lacrado:2};
  return (o[a.estado]-o[b.estado]) || a.nome.localeCompare(b.nome,'pt-BR');
}

/* ═══ TELAS ═══════════════════════════════════════════════════ */

/* ── PAINEL ────────────────────────────────────────────────── */
function painel(){
  const A=S.ambientes, tot=A.length;
  const lac=A.filter(a=>a.estado==='lacrado').length;
  const fec=A.filter(a=>a.estado==='fechamento').length;
  const p=S.itens.filter(i=>i.estado==='pendente').length;
  const e=S.itens.filter(i=>i.estado==='executado').length;
  const v=S.itens.filter(i=>i.estado==='verificado').length;
  const faltam=tot-lac;

  if(!tot){
    tel.innerHTML=`<div class="vazio">
      <h3>Obra sem ambientes</h3>
      <p>Cadastre as salas, corredores e blocos do prédio. O ambiente é a unidade — a pendência mora dentro dele.</p>
      <button class="btn forte" id="ir">Cadastrar o primeiro ambiente</button></div>`;
    $('#ir').onclick=()=>vai('ambientes');
    return;
  }

  const prontas=A.filter(a=>a.estado==='fechamento'&&!abertos(a.id).length).length;
  const velha=S.itens.filter(i=>i.estado!=='verificado').sort((a,b)=>a.criadoEm-b.criadoEm)[0];

  tel.innerHTML=`
    <div class="contador">
      <div class="contador-n">${faltam}</div>
      <div class="contador-l">${faltam===1?'ambiente para fechar':'ambientes para fechar'}</div>
      <div class="contador-sub">${lac} de ${tot} lacrados${fec?` · ${fec} em fechamento`:''}</div>
      <div class="barra">
        ${lac?`<i style="flex:${lac};background:var(--verde)"></i>`:''}
        ${fec?`<i style="flex:${fec};background:var(--zarcao)"></i>`:''}
        ${tot-lac-fec?`<i style="flex:${tot-lac-fec};background:var(--grafite-35)"></i>`:''}
      </div>
    </div>

    <div class="cifras">
      <div class="cifra pend"><b>${p}</b><span>Pendentes</span></div>
      <div class="cifra exec"><b>${e}</b><span>A conferir</span></div>
      <div class="cifra veri"><b>${v}</b><span>Verificadas</span></div>
    </div>

    ${prontas?`<div class="aviso"><div><strong>${prontas} ambiente${prontas>1?'s':''} sem pendência aberta.</strong><br>
      Passe a ronda e lacre. Ambiente lacrado sai da sua cabeça.</div></div>`:''}

    ${velha?`<div class="aviso"><div><strong>Mais antiga: ${dias(velha.criadoEm)} dias</strong><br>
      ${esc(velha.oficio)} — ${esc(velha.descricao)} · ${esc(nomeAmb(velha.ambienteId))}</div></div>`:''}

    <p class="olho">Frentes em fechamento</p>
    <div class="portas" id="pf"></div>`;

  const emFech=A.filter(a=>a.estado==='fechamento').sort(ordAmb);
  const alvo=emFech.length?emFech:A.filter(a=>a.estado!=='lacrado').sort(ordAmb).slice(0,6);
  if(!alvo.length){
    $('#pf').outerHTML=`<div class="vazio"><h3>Prédio inteiro lacrado</h3>
      <p>Nenhum ambiente aberto. Se apareceu serviço novo, reabra o ambiente e siga.</p></div>`;
  } else {
    $('#pf').innerHTML=alvo.map(porta).join('');
    ligarPortas();
  }
}

/* ── SIGNATURE: a porta ────────────────────────────────────── */
function porta(a){
  const c=contaAmb(a.id), lacrado=a.estado==='lacrado';
  const frentes=(a.frentes&&a.frentes.length)
    ? 'Falta: '+esc(a.frentes.join(', '))
    : (lacrado?'':'Nenhuma frente restante');
  return `<button class="porta ${a.estado}" data-amb="${a.id}">
    <div class="porta-cod num">${esc(a.codigo||'—')}</div>
    <div class="porta-nome">${esc(a.nome)}</div>
    ${frentes?`<div class="porta-frentes">${frentes}</div>`:''}
    <div class="porta-rodape">
      ${c.p?`<span class="tally p">${c.p}</span>`:''}
      ${c.e?`<span class="tally e">${c.e}</span>`:''}
      ${!c.p&&!c.e?`<span class="porta-vazia">${lacrado?'lacrado':'sem pendência'}</span>`:''}
    </div>
    ${lacrado?`<div class="lacre zebra"><span>Lacrado</span></div>`:''}
  </button>`;
}
function ligarPortas(){
  document.querySelectorAll('[data-amb]').forEach(b=>
    b.onclick=()=>{ambienteAberto=b.dataset.amb;vai('ambiente')});
}

/* ── AMBIENTES ─────────────────────────────────────────────── */
function ambientes(){
  const A=[...S.ambientes].sort(ordAmb);
  tel.innerHTML=`
    <div class="btn-linha" style="margin-bottom:16px">
      <button class="btn forte" id="novo">+ Novo ambiente</button>
    </div>
    ${A.length?`<p class="olho">${A.length} ambientes</p><div class="portas">${A.map(porta).join('')}</div>`
    :`<div class="vazio"><h3>Nenhum ambiente</h3>
       <p>Cadastre sala por sala. Use o código da porta se o prédio já tiver.</p></div>`}`;
  $('#novo').onclick=()=>formAmbiente();
  ligarPortas();
}

function formAmbiente(a){
  const novo=!a;
  a=a||{id:id(),nome:'',codigo:'',frentes:[],estado:'aberto',criadoEm:Date.now()};
  folha(novo?'Novo ambiente':'Editar ambiente',`
    <div class="campo"><label for="fn">Nome do ambiente</label>
      <input type="text" id="fn" value="${esc(a.nome)}" placeholder="Sala de reuniões" autocomplete="off"></div>
    <div class="campo"><label for="fc">Código / porta</label>
      <input type="text" id="fc" value="${esc(a.codigo)}" placeholder="T-12" autocomplete="off">
      <p class="dica">O que estiver escrito na porta. Se não tiver nada, invente e escreva lá.</p></div>
    <div class="campo"><label for="ff">Frentes que ainda faltam passar</label>
      <input type="text" id="ff" value="${esc((a.frentes||[]).join(', '))}" placeholder="pintura, forro, piso" autocomplete="off">
      <p class="dica">Separe por vírgula. Quando esvaziar, o ambiente entra em fechamento — é o gatilho.</p></div>
    ${novo?'':`<button class="btn fantasma larga" id="del">Excluir ambiente</button>`}
  `,`<button class="btn forte larga" id="sv">Salvar ambiente</button>`);

  $('#sv').onclick=async()=>{
    const n=$('#fn').value.trim();
    if(!n) return toast('O ambiente precisa de nome');
    a.nome=n; a.codigo=$('#fc').value.trim();
    a.frentes=$('#ff').value.split(',').map(s=>s.trim()).filter(Boolean);
    if(a.estado!=='lacrado') a.estado = a.frentes.length?'aberto':'fechamento';
    await grava('ambientes',a);
    S.ambientes=await todos('ambientes');
    fechaFolha(); render(); toast(novo?'Ambiente cadastrado':'Ambiente salvo');
  };
  if($('#del')) $('#del').onclick=async()=>{
    if(!confirm(`Excluir "${a.nome}" e as ${doAmb(a.id).length} pendências dele? Não tem volta.`)) return;
    for(const i of doAmb(a.id)){
      if(i.fotoAntes) await apaga('fotos',i.fotoAntes);
      if(i.fotoDepois) await apaga('fotos',i.fotoDepois);
      await apaga('itens',i.id);
    }
    await apaga('ambientes',a.id);
    await recarrega(); fechaFolha(); ambienteAberto=null; vai('ambientes'); toast('Ambiente excluído');
  };
}

/* ── UM AMBIENTE ───────────────────────────────────────────── */
async function ambiente(){
  const a=S.ambientes.find(x=>x.id===ambienteAberto);
  if(!a) return vai('ambientes');
  const L=doAmb(a.id).sort((x,y)=>
    ({pendente:0,executado:1,verificado:2}[x.estado]-{pendente:0,executado:1,verificado:2}[y.estado])
    || x.criadoEm-y.criadoEm);
  const ab=abertos(a.id).length;
  const est=ESTADO_AMB[a.estado];

  tel.innerHTML=`
    <div class="aviso" style="background:var(--forma);border-color:var(--concreto-2);border-left-color:${est.cor}">
      <div style="flex:1">
        <strong style="color:${est.cor}">${est.rot}</strong><br>
        ${a.frentes&&a.frentes.length
          ? `Ainda passam por aqui: <b>${esc(a.frentes.join(', '))}</b>. Pendência sem encobrimento espera a última frente sair.`
          : (a.estado==='lacrado'
            ? 'Ambiente lacrado. Se alguém precisar reabrir, passa por você.'
            : 'Nenhuma frente restante. Feche as pendências e lacre.')}
      </div>
    </div>

    <div class="btn-linha" style="margin-bottom:18px">
      <button class="btn" id="ed">Editar</button>
      ${a.estado==='lacrado'
        ? `<button class="btn escuro" id="reab">Reabrir ambiente</button>`
        : `<button class="btn ok" id="lac" ${ab?'disabled':''}>${ab?`Faltam ${ab}`:'Lacrar ambiente'}</button>`}
    </div>

    <p class="olho">${L.length?`${L.length} pendência${L.length>1?'s':''}`:'Sem pendências'}</p>
    <div id="lista"></div>`;

  $('#ed').onclick=()=>formAmbiente(a);
  if($('#lac')) $('#lac').onclick=async()=>{
    a.estado='lacrado'; a.frentes=[]; await grava('ambientes',a);
    S.ambientes=await todos('ambientes'); render(); toast('Ambiente lacrado');
  };
  if($('#reab')) $('#reab').onclick=async()=>{
    a.estado='fechamento'; await grava('ambientes',a);
    S.ambientes=await todos('ambientes'); render(); toast('Ambiente reaberto');
  };

  const box=$('#lista');
  if(!L.length){
    box.innerHTML=`<div class="vazio"><h3>Nada anotado aqui</h3>
      <p>Viu alguma coisa? Anota agora. Depois custa o dobro.</p></div>`;
    return;
  }
  box.innerHTML=await Promise.all(L.map(linhaItem)).then(x=>x.join(''));
  ligarItens();
}

async function linhaItem(i,comLocal){
  const u=await urlFoto(i.fotoAntes);
  const d=dias(i.criadoEm);
  return `<button class="item ${i.estado}" data-item="${i.id}">
    ${u?`<img class="item-mini" src="${u}" alt="">`
       :`<span class="item-mini vazio">s/foto</span>`}
    <span class="item-corpo">
      <span class="item-topo">
        <span class="oficio">${esc(i.oficio)}</span>
        ${comLocal?`<span class="idade">${esc(nomeAmb(i.ambienteId))}</span>`:''}
        <span class="idade ${d>21&&i.estado!=='verificado'?'velha':''}">${d}d</span>
      </span>
      <span class="item-desc">${esc(i.descricao)}</span>
      ${i.plano?`<span class="item-plano">${esc(i.plano)}</span>`:''}
    </span>
    ${i.estado!=='pendente'?`<span class="item-selo ${i.estado}">${i.estado==='executado'?'feito?':'ok'}</span>`:''}
  </button>`;
}
function ligarItens(){
  document.querySelectorAll('[data-item]').forEach(b=>
    b.onclick=()=>formItem(S.itens.find(i=>i.id===b.dataset.item)));
}

/* ── CAPTURA / ITEM ────────────────────────────────────────── */
async function formItem(it){
  const novo=!it;
  if(novo && !S.ambientes.length){ toast('Cadastre um ambiente antes'); return vai('ambientes'); }
  it=it||{id:id(),ambienteId:ambienteAberto||S.ambientes[0].id,oficio:'',descricao:'',
          plano:'',estado:'pendente',criadoEm:Date.now(),fotoAntes:null,fotoDepois:null};
  let blobAntes=null, tirouAntes=false;
  const uAntes=await urlFoto(it.fotoAntes);

  folha(novo?'Anotar pendência':'Pendência',`
    <div class="campo"><label>Foto do ponto</label>
      <div class="foto-slot" id="slot">
        ${uAntes?`<img src="${uAntes}" alt=""><button class="foto-x" id="fx" aria-label="Remover foto">×</button>`
        :`<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>Tocar para fotografar</span>`}
      </div>
      <p class="dica">Foto vale mais que descrição. Daqui a três semanas você não acha a tomada.</p></div>

    <div class="campo"><label>Ambiente</label>
      <select id="fa">${S.ambientes.map(a=>
        `<option value="${a.id}" ${a.id===it.ambienteId?'selected':''}>${esc(a.codigo?a.codigo+' — ':'')}${esc(a.nome)}</option>`).join('')}</select></div>

    <div class="campo"><label>Ofício</label>
      <div class="chips" id="fo">${OFICIOS.map(o=>
        `<button type="button" class="chip" data-o="${esc(o)}" aria-pressed="${o===it.oficio}">${esc(o)}</button>`).join('')}</div></div>

    <div class="campo"><label for="fd">O que está pendente</label>
      <input type="text" id="fd" value="${esc(it.descricao)}" placeholder="Tomada solta atrás da porta" autocomplete="off">
      <p class="dica">Uma linha. Se precisar de parágrafo, é serviço, não pendência.</p></div>

    <div class="campo"><label for="fp">Plano — o que fazer</label>
      <textarea id="fp" placeholder="Chamar o eletricista. Refixar caixa e trocar espelho.">${esc(it.plano)}</textarea>
      <p class="dica">Espaço pra você decidir, não formulário pra preencher. Se escrever demora mais que executar, deixa em branco.</p></div>

    ${novo?'':`
      <div class="btn-linha" style="margin-top:20px">
        ${it.estado==='pendente'?`<button class="btn azul" id="mex">Marcar executado</button>`:''}
        ${it.estado==='executado'?`<button class="btn fantasma" id="volta">Voltar p/ pendente</button>`:''}
        ${it.estado==='verificado'?`<button class="btn fantasma" id="reop">Reabrir</button>`:''}
      </div>
      <button class="btn fantasma larga" id="delI" style="margin-top:8px">Excluir pendência</button>`}
  `,`<button class="btn forte larga" id="svI">${novo?'Anotar e continuar':'Salvar'}</button>`);

  const slot=$('#slot');
  slot.onclick=async ev=>{
    if(ev.target.id==='fx'){
      blobAntes=null;tirouAntes=true;
      slot.innerHTML=`<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span>Tocar para fotografar</span>`;
      return;
    }
    const b=await tirarFoto(); if(!b) return;
    blobAntes=b;tirouAntes=true;
    slot.innerHTML=`<img src="${URL.createObjectURL(b)}" alt=""><button class="foto-x" id="fx" aria-label="Remover foto">×</button>`;
  };
  $('#fo').onclick=e=>{
    const c=e.target.closest('.chip'); if(!c) return;
    $('#fo').querySelectorAll('.chip').forEach(x=>x.setAttribute('aria-pressed','false'));
    c.setAttribute('aria-pressed','true'); it.oficio=c.dataset.o;
  };

  $('#svI').onclick=async()=>{
    const d=$('#fd').value.trim();
    if(!d) return toast('Descreva a pendência');
    if(!it.oficio) return toast('Escolha o ofício');
    it.descricao=d; it.plano=$('#fp').value.trim(); it.ambienteId=$('#fa').value;
    if(tirouAntes){
      if(it.fotoAntes){await apaga('fotos',it.fotoAntes);urls.delete(it.fotoAntes);it.fotoAntes=null}
      if(blobAntes){const f={id:id(),blob:blobAntes};await grava('fotos',f);it.fotoAntes=f.id}
    }
    await grava('itens',it); await recarrega();
    const amb=S.ambientes.find(x=>x.id===it.ambienteId);
    if(amb&&amb.estado==='lacrado'){amb.estado='fechamento';await grava('ambientes',amb);S.ambientes=await todos('ambientes')}
    fechaFolha(); render();
    toast(novo?'Anotado · '+dias(it.criadoEm)+'d':'Salvo');
    if(novo) setTimeout(()=>formItem(),260);   // rajada: anotar uma atrás da outra
  };
  if($('#mex')) $('#mex').onclick=()=>mudar(it,'executado');
  if($('#volta')) $('#volta').onclick=()=>mudar(it,'pendente');
  if($('#reop')) $('#reop').onclick=()=>mudar(it,'pendente');
  if($('#delI')) $('#delI').onclick=async()=>{
    if(!confirm('Excluir esta pendência?')) return;
    if(it.fotoAntes) await apaga('fotos',it.fotoAntes);
    if(it.fotoDepois) await apaga('fotos',it.fotoDepois);
    await apaga('itens',it.id); await recarrega(); fechaFolha(); render(); toast('Excluída');
  };
}
async function mudar(it,e){
  it.estado=e;
  if(e==='executado') it.executadoEm=Date.now();
  if(e==='verificado') it.verificadoEm=Date.now();
  await grava('itens',it); await recarrega(); fechaFolha(); render();
  toast(e==='executado'?'Vai pra ronda':'Atualizado');
}

/* ── VARREDURA ─────────────────────────────────────────────────
   Pendência espalhada não fecha ambiente. Fecha ofício.
   Um ofício, uma passada, o prédio inteiro.
   ──────────────────────────────────────────────────────────── */
let ofVarr=null;
async function varredura(){
  const ab=S.itens.filter(i=>i.estado!=='verificado');
  const cont={}; ab.forEach(i=>cont[i.oficio]=(cont[i.oficio]||0)+1);
  const lista=Object.entries(cont).sort((a,b)=>b[1]-a[1]);
  if(ofVarr && !cont[ofVarr]) ofVarr=null;

  if(!lista.length){
    tel.innerHTML=`<div class="vazio"><h3>Nada em aberto</h3>
      <p>Nenhuma pendência sem verificar no prédio inteiro.</p></div>`;
    return;
  }
  tel.innerHTML=`
    <div class="aviso"><div><strong>Uma passada por ofício</strong><br>
      Chamar o oficial custa; ele andar o prédio não. Toque no ofício e resolva tudo dele numa ida só.</div></div>
    <p class="olho">Ofícios em aberto</p>
    <div class="chips" id="vo" style="margin-bottom:18px">
      ${lista.map(([o,n])=>`<button class="chip" data-o="${esc(o)}" aria-pressed="${o===ofVarr}">${esc(o)} <b class="num" style="margin-left:5px">${n}</b></button>`).join('')}
    </div>
    <div id="vl"></div>`;

  $('#vo').onclick=e=>{
    const c=e.target.closest('.chip'); if(!c) return;
    ofVarr = ofVarr===c.dataset.o ? null : c.dataset.o;
    varredura();
  };

  const alvo = ofVarr ? ab.filter(i=>i.oficio===ofVarr) : [];
  const box=$('#vl');
  if(!ofVarr){
    box.innerHTML=`<div class="vazio"><h3>Escolha um ofício</h3>
      <p>A lista sai agrupada por ambiente, na ordem de quem anda o prédio.</p></div>`;
    return;
  }
  const porAmb={}; alvo.forEach(i=>(porAmb[i.ambienteId]=porAmb[i.ambienteId]||[]).push(i));
  const chaves=Object.keys(porAmb).sort((a,b)=>nomeAmb(a).localeCompare(nomeAmb(b),'pt-BR'));
  let h=`<div class="btn-linha" style="margin-bottom:14px">
    <button class="btn azul" id="tudoOk">Marcar os ${alvo.length} como executados</button>
    <button class="btn escuro" id="mandar">Mandar pro encarregado</button></div>`;
  for(const k of chaves){
    h+=`<p class="olho">${esc(nomeAmb(k))}</p>`;
    h+=(await Promise.all(porAmb[k].map(i=>linhaItem(i,false)))).join('');
  }
  box.innerHTML=h; ligarItens();
  $('#tudoOk').onclick=async()=>{
    if(!confirm(`Marcar ${alvo.length} pendências de ${ofVarr} como executadas? Elas vão pra ronda, não somem.`)) return;
    for(const i of alvo){i.estado='executado';i.executadoEm=Date.now();await grava('itens',i)}
    await recarrega(); render(); toast('Foram pra ronda');
  };
  $('#mandar').onclick=()=>{alvoDespacho={tipo:'oficio',v:ofVarr};vai('despacho')};
}

/* ── RONDA ─────────────────────────────────────────────────────
   O encarregado alega. Você verifica. Alegação não é fato.
   ──────────────────────────────────────────────────────────── */
async function ronda(){
  const L=S.itens.filter(i=>i.estado==='executado')
    .sort((a,b)=>nomeAmb(a.ambienteId).localeCompare(nomeAmb(b.ambienteId),'pt-BR'));
  if(!L.length){
    tel.innerHTML=`<div class="vazio"><h3>Nada para conferir</h3>
      <p>Quando o encarregado der um serviço por feito, marque como executado. Ele aparece aqui, e só sai daqui com a sua conferência.</p></div>`;
    return;
  }
  tel.innerHTML=`
    <div class="aviso"><div><strong>${L.length} para conferir na parede</strong><br>
      Compare a foto com o que está na sua frente. Tarefa não verificada é tarefa que não existe.</div></div>
    <div id="rl"></div>`;
  const box=$('#rl'); box.innerHTML='';
  for(const i of L){
    const ua=await urlFoto(i.fotoAntes), ud=await urlFoto(i.fotoDepois);
    const d=document.createElement('div'); d.className='ronda-card';
    d.innerHTML=`
      <div class="ronda-cab">
        <div class="ronda-local"><span class="oficio">${esc(i.oficio)}</span> &nbsp;${esc(nomeAmb(i.ambienteId))}</div>
        <div class="ronda-desc">${esc(i.descricao)}</div>
      </div>
      ${ua?`<div class="ronda-fotos ${ud?'par':''}">
        <div class="ronda-foto"><img src="${ua}" alt="Antes"><b>Antes</b></div>
        ${ud?`<div class="ronda-foto"><img src="${ud}" alt="Depois"><b>Depois</b></div>`:''}
      </div>`:''}
      <div class="ronda-acoes">
        <button class="btn fantasma" data-a="foto">${ud?'Refazer depois':'Foto depois'}</button>
        <button class="btn fantasma" data-a="nao">Não passou</button>
        <button class="btn ok" data-a="ok">Verificado</button>
      </div>`;
    d.onclick=async ev=>{
      const b=ev.target.closest('[data-a]'); if(!b) return;
      const a=b.dataset.a;
      if(a==='ok'){
        i.estado='verificado';i.verificadoEm=Date.now();await grava('itens',i);await recarrega();
        const amb=S.ambientes.find(x=>x.id===i.ambienteId);
        if(amb&&amb.estado==='fechamento'&&!abertos(amb.id).length) toast(amb.nome+' pronto pra lacrar');
        else toast('Verificado');
        render();
      }
      if(a==='nao'){
        i.estado='pendente';await grava('itens',i);await recarrega();render();toast('Voltou pra pendente');
      }
      if(a==='foto'){
        const bl=await tirarFoto(); if(!bl) return;
        if(i.fotoDepois){await apaga('fotos',i.fotoDepois);urls.delete(i.fotoDepois)}
        const f={id:id(),blob:bl};await grava('fotos',f);i.fotoDepois=f.id;
        await grava('itens',i);await recarrega();render();
      }
    };
    box.appendChild(d);
  }
}

/* ── DESPACHO ──────────────────────────────────────────────────
   Uma superfície só. O encarregado não entra no app —
   ele recebe texto onde já vive.
   ──────────────────────────────────────────────────────────── */
let alvoDespacho=null;
function despacho(){
  const ab=S.itens.filter(i=>i.estado==='pendente');
  if(!ab.length){
    tel.innerHTML=`<div class="vazio"><h3>Nada a despachar</h3>
      <p>Nenhuma pendência pendente. O que estiver executado está na ronda, esperando você.</p></div>`;
    return;
  }
  const ofc={}; ab.forEach(i=>ofc[i.oficio]=(ofc[i.oficio]||0)+1);
  const amb={}; ab.forEach(i=>amb[i.ambienteId]=(amb[i.ambienteId]||0)+1);

  tel.innerHTML=`
    <div class="aviso"><div><strong>Ordem do dia</strong><br>
      Gere a lista curta, cole no WhatsApp do encarregado. O detalhe fica com você; ele recebe o que dá pra executar.</div></div>
    <p class="olho">Recortar por</p>
    <div class="chips" id="dc" style="margin-bottom:14px">
      <button class="chip" data-t="tudo" aria-pressed="false">Tudo (${ab.length})</button>
      ${Object.entries(ofc).sort((a,b)=>b[1]-a[1]).map(([o,n])=>
        `<button class="chip" data-t="oficio" data-v="${esc(o)}" aria-pressed="false">${esc(o)} <b class="num" style="margin-left:5px">${n}</b></button>`).join('')}
      ${Object.entries(amb).sort((a,b)=>b[1]-a[1]).map(([k,n])=>
        `<button class="chip" data-t="ambiente" data-v="${esc(k)}" aria-pressed="false">${esc(nomeAmb(k))} <b class="num" style="margin-left:5px">${n}</b></button>`).join('')}
    </div>
    <div class="saida" id="ds"></div>
    <div class="btn-linha" style="margin-top:12px">
      <button class="btn forte" id="wa">Abrir no WhatsApp</button>
      <button class="btn" id="cp">Copiar texto</button>
    </div>`;

  const marca=()=>{
    document.querySelectorAll('#dc .chip').forEach(c=>{
      const on = alvoDespacho && c.dataset.t===alvoDespacho.tipo &&
                 (c.dataset.v||'')===(alvoDespacho.v||'');
      c.setAttribute('aria-pressed',on?'true':'false');
    });
  };
  const pinta=()=>{ $('#ds').textContent=montaTexto(); marca(); };

  $('#dc').onclick=e=>{
    const c=e.target.closest('.chip'); if(!c) return;
    alvoDespacho={tipo:c.dataset.t,v:c.dataset.v||null}; pinta();
  };
  if(!alvoDespacho) alvoDespacho={tipo:'tudo',v:null};
  pinta();

  $('#cp').onclick=async()=>{
    try{ await navigator.clipboard.writeText(montaTexto()); toast('Copiado') }
    catch{ toast('Segure no texto e copie') }
  };
  $('#wa').onclick=()=>window.open('https://wa.me/?text='+encodeURIComponent(montaTexto()),'_blank');
}
function montaTexto(){
  const a=alvoDespacho||{tipo:'tudo'};
  let L=S.itens.filter(i=>i.estado==='pendente');
  let cab='';
  if(a.tipo==='oficio'){L=L.filter(i=>i.oficio===a.v); cab=a.v.toUpperCase();}
  if(a.tipo==='ambiente'){L=L.filter(i=>i.ambienteId===a.v); cab=nomeAmb(a.v).toUpperCase();}
  if(a.tipo==='tudo') cab='TODAS AS FRENTES';
  const dt=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  let t=`*PENDÊNCIAS — ${cab}*\n${S.obra.nome} · ${dt}\n`;
  if(!L.length) return t+'\nNada em aberto.';
  const g={}; L.forEach(i=>(g[a.tipo==='oficio'?nomeAmb(i.ambienteId):i.oficio] ||= []).push(i));
  for(const k of Object.keys(g).sort((x,y)=>x.localeCompare(y,'pt-BR'))){
    t+=`\n*${k}*\n`;
    g[k].forEach(i=>{ t+=`• ${i.descricao}${i.plano?` — ${i.plano.replace(/\n+/g,' ')}`:''}\n` });
  }
  t+=`\n_${L.length} ${L.length>1?'itens':'item'}. Terminou? Me avisa que eu passo pra conferir._`;
  return t;
}

/* ── COFRE (backup) ────────────────────────────────────────────
   Dado local é dado que some. Sem export, o app é uma aposta.
   ──────────────────────────────────────────────────────────── */
async function cofre(){
  let persist=false;
  try{ persist = navigator.storage&&navigator.storage.persisted ? await navigator.storage.persisted() : false }catch{}
  let uso='—';
  try{
    if(navigator.storage&&navigator.storage.estimate){
      const e=await navigator.storage.estimate();
      uso=(e.usage/1048576).toFixed(1)+' MB';
    }
  }catch{}
  const nF=(await todos('fotos')).length;
  const ult=await pega('meta','ultimoBackup');
  const dU=ult? dias(ult.v) : null;

  tel.innerHTML=`
    ${persist?'':`<div class="aviso"><div><strong>Armário ainda não é permanente</strong><br>
      O navegador pode descartar seus dados se o tablet ficar sem espaço. Toque abaixo pra travar.</div></div>`}
    ${dU===null?`<div class="aviso"><div><strong>Você nunca fez backup</strong><br>
      Exporte hoje. Se o tablet cair na betoneira, é isso que salva a obra.</div></div>`
      : dU>7?`<div class="aviso"><div><strong>Último backup: ${dU} dias</strong><br>Exporte de novo e jogue no Drive.</div></div>`:''}

    <p class="olho">Este aparelho</p>
    <div class="cifras" style="grid-template-columns:repeat(3,1fr)">
      <div class="cifra"><b>${S.ambientes.length}</b><span>Ambientes</span></div>
      <div class="cifra"><b>${S.itens.length}</b><span>Pendências</span></div>
      <div class="cifra"><b>${nF}</b><span>Fotos</span></div>
    </div>
    <p class="dica" style="margin:-8px 0 20px">Ocupando ${uso} · Armazenamento permanente: <b>${persist?'travado':'não travado'}</b></p>

    ${persist?'':`<button class="btn forte larga" id="trava" style="margin-bottom:10px">Travar armazenamento</button>`}
    <button class="btn escuro larga" id="exp" style="margin-bottom:10px">Exportar backup</button>
    <button class="btn larga" id="imp" style="margin-bottom:22px">Restaurar backup</button>

    <p class="olho">Onde ficam seus dados</p>
    <p class="dica" style="margin-bottom:6px">Tudo — pendências, planos e fotos — fica gravado <b>neste tablet</b>. Nada é enviado pra internet, nem pra quem hospeda o app. Não existe conta, não existe nuvem, ninguém mais vê sua obra.</p>
    <p class="dica">A contrapartida é essa tela: se você perder o tablet, limpar os dados do Chrome ou desinstalar o app, acabou. O backup é a única rede.</p>`;

  if($('#trava')) $('#trava').onclick=async()=>{
    try{
      const ok = navigator.storage&&navigator.storage.persist ? await navigator.storage.persist() : false;
      toast(ok?'Armazenamento travado':'O Chrome recusou — exporte com mais frequência');
      render();
    }catch{ toast('Não deu') }
  };
  $('#exp').onclick=exportar;
  $('#imp').onclick=importar;
}
async function exportar(){
  toast('Montando backup…');
  const fotos=await todos('fotos');
  const b64=b=>new Promise(ok=>{const r=new FileReader();r.onload=()=>ok(r.result);r.readAsDataURL(b)});
  const F=[]; for(const f of fotos) F.push({id:f.id,d:await b64(f.blob)});
  const pack={app:'diario-pendencias',v:1,em:Date.now(),obra:S.obra,
    ambientes:S.ambientes,itens:S.itens,fotos:F};
  const nome='pendencias-'+new Date().toISOString().slice(0,10)+'.json';
  const bl=new Blob([JSON.stringify(pack)],{type:'application/json'});
  const f=new File([bl],nome,{type:'application/json'});
  if(navigator.canShare&&navigator.canShare({files:[f]})){
    try{ await navigator.share({files:[f],title:nome}); await marcarBackup(); return }catch{}
  }
  const u=URL.createObjectURL(bl), a=document.createElement('a');
  a.href=u;a.download=nome;a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1500);
  await marcarBackup();
}
async function marcarBackup(){ await grava('meta',{k:'ultimoBackup',v:Date.now()}); toast('Backup pronto — guarde no Drive'); render(); }
function importar(){
  const i=document.createElement('input'); i.type='file'; i.accept='application/json,.json';
  i.onchange=async()=>{
    const f=i.files&&i.files[0]; if(!f) return;
    let p; try{ p=JSON.parse(await f.text()) }catch{ return toast('Arquivo inválido') }
    if(p.app!=='diario-pendencias') return toast('Esse backup não é deste app');
    if(!confirm(`Restaurar ${p.ambientes.length} ambientes e ${p.itens.length} pendências? Isso apaga o que está no tablet agora.`)) return;
    for(const l of ['ambientes','itens','fotos','meta'])
      await req(db.transaction(l,'readwrite').objectStore(l).clear());
    urls.forEach(u=>URL.revokeObjectURL(u)); urls.clear();
    for(const a of p.ambientes) await grava('ambientes',a);
    for(const it of p.itens) await grava('itens',it);
    for(const ft of (p.fotos||[])) await grava('fotos',{id:ft.id,blob:await (await fetch(ft.d)).blob()});
    if(p.obra) await grava('meta',{k:'obra',v:p.obra});
    await recarrega(); vai('painel'); toast('Backup restaurado');
  };
  i.click();
}

/* ── FOLHA ─────────────────────────────────────────────────── */
function folha(titulo,corpo,pe){
  fechaFolha();
  const d=document.createElement('div'); d.className='folha'; d.id='folha';
  d.innerHTML=`<div class="folha-corpo" role="dialog" aria-modal="true" aria-label="${esc(titulo)}">
    <div class="folha-topo"><h2>${esc(titulo)}</h2><button class="fechar" aria-label="Fechar">×</button></div>
    <div class="folha-scroll">${corpo}</div>
    ${pe?`<div class="folha-pe">${pe}</div>`:''}</div>`;
  d.onclick=e=>{ if(e.target===d||e.target.classList.contains('fechar')) fechaFolha() };
  document.body.appendChild(d);
  const f=d.querySelector('input,textarea,select'); if(f&&window.innerWidth>760) f.focus();
}
const fechaFolha=()=>{const f=$('#folha'); if(f) f.remove()};

/* ── ROTEADOR ──────────────────────────────────────────────── */
const TELAS={painel,ambientes,ambiente,varredura,ronda,despacho,cofre};
const TITULOS={painel:'Painel',ambientes:'Ambientes',varredura:'Varredura por ofício',
  ronda:'Ronda de verificação',despacho:'Despacho',cofre:'Cofre'};

function vai(t){ tela=t; render(); document.querySelector('main').scrollTop=0; }

function render(){
  document.querySelectorAll('#nav button').forEach(b=>{
    const on = b.dataset.t===tela || (tela==='ambiente'&&b.dataset.t==='ambientes');
    b.setAttribute('aria-current',on?'page':'false');
  });
  const nR=S.itens.filter(i=>i.estado==='executado').length;
  const bg=$('#badgeRonda');
  bg.textContent=nR; bg.classList.toggle('esconde',!nR);

  const pa=$('#placaAcao');
  if(tela==='ambiente'){
    const a=S.ambientes.find(x=>x.id===ambienteAberto);
    $('#placaId').textContent=(a&&a.codigo)||'AMB';
    $('#placaTitulo').textContent=a?a.nome:'Ambiente';
    const c=a?contaAmb(a.id):{p:0,e:0,t:0};
    $('#placaSub').textContent=a?`${ESTADO_AMB[a.estado].rot} · ${c.p} pendente${c.p===1?'':'s'} · ${c.e} a conferir`:'';
    pa.textContent='‹ Voltar'; pa.classList.remove('esconde');
    pa.onclick=()=>{ambienteAberto=null;vai('ambientes')};
  } else {
    $('#placaId').textContent=S.obra.codigo||'OBRA';
    $('#placaTitulo').textContent=TITULOS[tela];
    $('#placaSub').textContent=S.obra.nome;
    pa.classList.add('esconde'); pa.onclick=null;
  }

  const cap=$('#btnCaptura');
  cap.classList.toggle('esconde', !['painel','ambientes','ambiente','varredura'].includes(tela));

  tel.innerHTML='';
  Promise.resolve(TELAS[tela]()).catch(e=>{
    console.error(e);
    tel.innerHTML=`<div class="vazio"><h3>Essa tela travou</h3>
      <p>Exporte o backup pelo Cofre antes de mexer em qualquer coisa.</p></div>`;
  });
}

async function recarrega(){
  S.ambientes=await todos('ambientes');
  S.itens=await todos('itens');
}

/* ── PARTIDA ───────────────────────────────────────────────── */
(async function(){
  try{ await abrir() }catch(e){
    document.body.innerHTML=`<div style="padding:30px;font-family:system-ui;max-width:560px;margin:0 auto">
      <h2 style="font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em">O armário não abriu</h2>
      <p>O navegador recusou o armazenamento local. Isso acontece quando o app é aberto como <b>arquivo solto</b> (endereço <code>file://</code>) ou em aba anônima.</p>
      <p>Publique num endereço <code>https</code> — GitHub Pages — e abra por lá.</p></div>`;
    return;
  }
  const o=await pega('meta','obra'); if(o) S.obra=o.v;
  await recarrega();
  try{ if(navigator.storage&&navigator.storage.persist) await navigator.storage.persist() }catch{}

  $('#nav').onclick=e=>{const b=e.target.closest('button[data-t]'); if(b) vai(b.dataset.t)};
  $('#btnCaptura').onclick=()=>formItem();
  $('#placaTitulo').onclick=()=>{ if(tela!=='ambiente') formObra() };
  window.addEventListener('keydown',e=>{ if(e.key==='Escape') fechaFolha() });
  render();

  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();

function formObra(){
  folha('Identificação da obra',`
    <div class="campo"><label for="on">Nome da obra</label>
      <input type="text" id="on" value="${esc(S.obra.nome)}" autocomplete="off"></div>
    <div class="campo"><label for="oc">Sigla</label>
      <input type="text" id="oc" value="${esc(S.obra.codigo)}" maxlength="8" autocomplete="off">
      <p class="dica">Aparece na placa preta do topo e no cabeçalho do despacho.</p></div>
  `,`<button class="btn forte larga" id="so">Salvar</button>`);
  $('#so').onclick=async()=>{
    S.obra={nome:$('#on').value.trim()||'Obra',codigo:($('#oc').value.trim()||'OBRA').toUpperCase()};
    await grava('meta',{k:'obra',v:S.obra}); fechaFolha(); render(); toast('Salvo');
  };
}
</script>
</body>
