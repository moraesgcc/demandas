<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#17181B"/>
  <!-- porta -->
  <rect x="150" y="96" width="212" height="320" fill="#F3F1EB"/>
  <!-- batente amarelo -->
  <rect x="150" y="96" width="26" height="320" fill="#FFC400"/>
  <!-- maçaneta -->
